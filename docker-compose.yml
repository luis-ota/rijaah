services:
  postgres:
    image: postgres:16-alpine
    container_name: rijaah-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rijaah
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rijaah"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    image: rijaah-test-backend
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: rijaah-backend
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rijaah
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/auth/me',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    image: rijaah-test-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: rijaah-frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3001
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  pgdata:
