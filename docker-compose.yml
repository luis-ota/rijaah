services:
  postgres:
    image: postgres:16-alpine
    container_name: rijaah-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rijaah
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rijaah"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    image: rijaah-backend
    build:
      context: ./server
      dockerfile: Dockerfile
      network: host
    container_name: rijaah-backend
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rijaah
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3001/auth/me').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

  frontend:
    image: rijaah-frontend
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        VITE_API_URL: /api
    container_name: rijaah-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      BACKEND_URL: http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
